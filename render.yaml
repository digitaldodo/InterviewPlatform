services:
  - type: web
    name: interview-platform-api
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        value: interview_platform
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://interview-platform-frontend.onrender.com,https://*.onrender.com,http://localhost:3000,http://localhost:5173,http://localhost:5500,http://127.0.0.1:5500,null
      - key: JWT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: interviewprep/avatars
      - key: FRONTEND_URL
        value: https://interview-platform-frontend.onrender.com
      - key: MEETING_DEFAULT_PROVIDER
        value: JITSI
      - key: JITSI_DOMAIN
        value: meet.jit.si
      - key: JITSI_TENANT
        value: ""
      - key: ZOOM_ACCOUNT_ID
        sync: false
      - key: ZOOM_CLIENT_ID
        sync: false
      - key: ZOOM_CLIENT_SECRET
        sync: false
      - key: ZOOM_USER_ID
        sync: false

  - type: web
    name: interview-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: printf "window.INTERVIEW_API_BASE = '%s';\n" "$INTERVIEW_API_BASE" > js/env.js
    staticPublishPath: .
    autoDeploy: true
    envVars:
      - key: INTERVIEW_API_BASE
        value: https://interview-platform-api-iv6x.onrender.com
