server.port=${PORT:8080}
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/interview_platform}
spring.data.mongodb.database=${MONGO_DATABASE:interview_platform}
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:12MB}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:5500,http://127.0.0.1:5500,null,https://*.onrender.com}

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-at-least-32-characters}
app.jwt.issuer=${JWT_ISSUER:interviewprep-api}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:45}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:14}
app.frontend-url=${FRONTEND_URL:http://localhost:5500}
app.sendgrid.api-key=${SENDGRID_API_KEY:}
app.sendgrid.from-email=${SENDGRID_FROM_EMAIL:no-reply@interviewprep.local}
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:interviewprep/avatars}
app.cloudinary.resume-folder=${CLOUDINARY_RESUME_FOLDER:interviewprep/resumes}
app.meetings.default-provider=${MEETING_DEFAULT_PROVIDER:JITSI}
app.meetings.jitsi.domain=${JITSI_DOMAIN:meet.jit.si}
app.meetings.jitsi.tenant=${JITSI_TENANT:}
app.meetings.zoom.account-id=${ZOOM_ACCOUNT_ID:}
app.meetings.zoom.client-id=${ZOOM_CLIENT_ID:}
app.meetings.zoom.client-secret=${ZOOM_CLIENT_SECRET:}
app.meetings.zoom.user-id=${ZOOM_USER_ID:}
app.admin.username=${ADMIN_USERNAME:}
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}

app.cache.ttl-seconds=${CACHE_TTL_SECONDS:120}
app.cache.max-entries=${CACHE_MAX_ENTRIES:5000}

app.rate-limit.auth.max-requests=${RATE_LIMIT_AUTH_MAX_REQUESTS:10}
app.rate-limit.auth.window-seconds=${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
app.rate-limit.otp.max-requests=${RATE_LIMIT_OTP_MAX_REQUESTS:5}
app.rate-limit.otp.window-seconds=${RATE_LIMIT_OTP_WINDOW_SECONDS:300}
app.rate-limit.review.max-requests=${RATE_LIMIT_REVIEW_MAX_REQUESTS:12}
app.rate-limit.review.window-seconds=${RATE_LIMIT_REVIEW_WINDOW_SECONDS:300}
app.rate-limit.booking.max-requests=${RATE_LIMIT_BOOKING_MAX_REQUESTS:12}
app.rate-limit.booking.window-seconds=${RATE_LIMIT_BOOKING_WINDOW_SECONDS:300}

app.cloudinary.connect-timeout-ms=${CLOUDINARY_CONNECT_TIMEOUT_MS:5000}
app.cloudinary.read-timeout-ms=${CLOUDINARY_READ_TIMEOUT_MS:15000}
