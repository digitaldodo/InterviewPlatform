server.port=${PORT:8080}
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/interview_platform}
spring.data.mongodb.database=${MONGO_DATABASE:interview_platform}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:5500,http://127.0.0.1:5500,null,https://*.onrender.com}

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-at-least-32-characters}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:45}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:14}
app.frontend-url=${FRONTEND_URL:http://localhost:5500}
app.sendgrid.api-key=${SENDGRID_API_KEY:}
app.sendgrid.from-email=${SENDGRID_FROM_EMAIL:no-reply@interviewprep.local}
